<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Novaa — Koleksi Afiliasi</title>
  <meta name="description" content="Temukan rekomendasi produk affiliate terbaik untuk kebutuhan harian Anda." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header id="topbar" class="topbar">
    <div class="shell nav-inner">
      <a class="brand" href="#" aria-label="Novaa home">NOVAA</a>
      <div class="nav-actions">
        <button id="themeToggle" class="icon-btn" type="button" aria-label="Ubah tema">🌙</button>
        <button id="favToggle" class="icon-btn fav-toggle" type="button" aria-label="Lihat favorit saya">
          ❤️ <span id="favCount" class="fav-count">0</span>
        </button>
      </div>
    </div>
  </header>

  <main class="shell">
    <section class="hero">
      <p class="eyebrow">Affiliate Product Picks</p>
      <h1>Produk pilihan, tampilan premium, belanja lebih cepat.</h1>
      <p class="hero-sub">Jelajahi koleksi kurasi terbaik dengan performa mobile yang halus, mode gelap, dan fitur favorit personal.</p>
      <label class="search-wrap" for="searchInput">
        <span>⌕</span>
        <input id="searchInput" type="search" placeholder="Cari nama, label, harga, atau deskripsi produk…" autocomplete="off" />
      </label>
      <div class="chip-row" role="tablist" aria-label="Filter tampilan">
        <button id="tabAll" class="chip active" type="button" role="tab" aria-selected="true">Semua Produk</button>
        <button id="tabFav" class="chip" type="button" role="tab" aria-selected="false">Favorit Saya</button>
      </div>
    </section>

    <section id="folderGrid" class="folder-grid" aria-live="polite"></section>
  </main>

  <button id="backToTop" class="back-top" type="button" aria-label="Kembali ke atas">↑</button>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <template id="folderTemplate">
    <article class="folder-card reveal-item">
      <button class="folder-head" type="button">
        <div class="folder-preview"><div class="folder-collage"></div></div>
        <div class="folder-info">
          <h2 class="folder-id"></h2>
          <span class="folder-meta"></span>
        </div>
        <div class="folder-chevron">▾</div>
      </button>
      <div class="product-wrap">
        <div class="product-wrap-inner">
          <div class="product-grid"></div>
        </div>
      </div>
    </article>
  </template>

  <template id="productTemplate">
    <article class="product-card reveal-item">
      <div class="image-wrap">
        <img class="product-image" alt="" loading="lazy" decoding="async" />
      </div>
      <div class="product-body">
        <div class="product-row">
          <h3 class="product-name"></h3>
          <span class="product-label"></span>
        </div>
        <p class="product-price"></p>
        <p class="product-description"></p>
        <div class="product-actions">
          <a class="buy-btn ripple-btn" target="_blank" rel="noopener">Lihat Produk</a>
          <button class="go-folder-btn" type="button" hidden>📂 Folder</button>
          <button class="fav-btn" type="button" aria-label="Simpan favorit">♡</button>
        </div>
      </div>
    </article>
  </template>

  <script src="app.js" defer></script>
</body>
</html>
