<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Novaa — Affiliate Folders</title>
  <meta name="description" content="Modern folder-based affiliate directory." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Affiliate Directory</p>
        <h1>Curated Product Folders</h1>
      </div>
      <label class="search-wrap" for="searchInput">
        <span>⌕</span>
        <input id="searchInput" type="search" placeholder="Search folders or products…" autocomplete="off" />
      </label>
    </header>

    <main>
      <section id="folderGrid" class="folder-grid" aria-live="polite"></section>
    </main>
  </div>

  <template id="folderTemplate">
    <article class="folder-card">
      <button class="folder-head" type="button">
        <div>
          <p class="folder-id"></p>
          <h2 class="folder-title"></h2>
          <p class="folder-desc"></p>
        </div>
        <span class="folder-meta"></span>
      </button>
      <div class="product-wrap">
        <div class="product-grid"></div>
      </div>
    </article>
  </template>

  <template id="productTemplate">
    <article class="product-card">
      <img class="product-image" alt="" loading="lazy" />
      <div class="product-body">
        <div class="product-row">
          <h3 class="product-name"></h3>
          <span class="product-label"></span>
        </div>
        <p class="product-price"></p>
        <p class="product-description"></p>
        <div class="product-actions">
          <a class="buy-btn" target="_blank" rel="noopener">Buy Now</a>
          <button class="copy-btn" type="button">Copy Link</button>
        </div>
      </div>
    </article>
  </template>

  <script src="app.js" defer></script>
</body>
</html>
